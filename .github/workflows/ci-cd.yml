name: CI/CD Pipeline

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js (optional)
        if: ${{ hashFiles('**/package.json') != '' }}
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Python (optional)
        if: ${{ hashFiles('**/requirements.txt', '**/pyproject.toml') != '' }}
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install and run Node.js checks
        if: ${{ hashFiles('**/package.json') != '' }}
        run: |
          npm ci || npm install
          npm run lint --if-present
          npm test --if-present
          npm run build --if-present

      - name: Install and run Python checks
        if: ${{ hashFiles('**/requirements.txt', '**/pyproject.toml') != '' }}
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f pyproject.toml ]; then pip install .; fi
          pytest -q

      - name: Run semantic query workers script
        run: |
          if [ ! -d "Semantic_query_testing" ]; then
            echo "Directory Semantic_query_testing not found."
            exit 1
          fi
          cd Semantic_query_testing
          if [ ! -f "run_workers_variation12_first200.py" ]; then
            echo "Script run_workers_variation12_first200.py not found."
            exit 1
          fi
          python3 run_workers_variation12_first200.py

      - name: Upload semantic worker artifacts
        if: ${{ always() && hashFiles('artifact/*') != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: semantic-worker-results
          path: artifact/
          if-no-files-found: error

      - name: Fallback check for empty/new repos
        if: ${{ hashFiles('**/package.json', '**/requirements.txt', '**/pyproject.toml') == '' }}
        run: echo "No Node.js or Python project files found yet. CI starter is ready."
